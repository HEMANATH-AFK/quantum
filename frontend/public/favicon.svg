<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="quantumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>
  <!-- Background rect with dark brand color -->
  <rect width="100" height="100" rx="28" fill="#0f0c29" />
  <rect width="90" height="90" x="5" y="5" rx="23" fill="none" stroke="url(#quantumGrad)" stroke-width="3" stroke-opacity="0.4" />
  
  <!-- Glowing neon dot in Q tail -->
  <circle cx="68" cy="68" r="6" fill="#38bdf8" />

  <!-- Styled italic 'Q' -->
  <text x="47" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="900" fill="url(#quantumGrad)" font-style="italic" text-anchor="middle">Q</text>
</svg>
